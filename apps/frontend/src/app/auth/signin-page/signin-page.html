<!-- Template for user sign-in with email and password form. -->
<pc-auth-layout>
  @if (!requires2FA()) { @if (verificationPending()) {
  <div class="alert alert-warning text-sm mb-4 bg-amber-950/40 border-amber-500/40 text-amber-200">
    <div class="flex flex-col gap-2 w-full">
      <div class="flex items-center gap-2 font-semibold">
        <pc-icon name="exclamation-circle" [size]="5"></pc-icon>
        <span>Verification Pending</span>
      </div>
      <p class="text-xs text-amber-200/80">
        A verification link was sent to <strong class="text-amber-100">{{ pendingEmail() }}</strong>. Please check your
        inbox.
      </p>
      <button
        class="btn btn-xs btn-outline btn-warning mt-1 w-fit"
        type="button"
        (click)="resendVerification()"
        [disabled]="resending()"
      >
        {{ resending() ? 'Sending...' : 'Resend Verification Email' }}
      </button>
    </div>
  </div>
  }
  <label class="label text-neutral-100">Enter your email and password to sign in</label>
  <form (submit)="signIn($event)" novalidate>
    <div class="space-y-3">
      <label class="input w-full validator">
        <pc-icon [size]="4" name="at-symbol" />
        <input type="email" placeholder="Enter your email" [formField]="form.email" aria-label="Email" />
      </label>

      <label class="input w-full validator">
        <pc-icon [size]="4" name="lock-closed" />
        <input type="password" placeholder="Enter your password" [formField]="form.password" aria-label="Password" />
      </label>

      <div class="flex items-center justify-between pt-2">
        <div class="flex items-center">
          <input
            id="remember_me"
            name="remember_me"
            type="checkbox"
            class="checkbox checkbox-primary checkbox-sm"
            [checked]="persistence"
            (change)="togglePersistence($event.target)"
          />
          <label for="remember_me" class="ml-2 block text-sm text-neutral-100"> Remember me </label>
        </div>
        <div class="text-sm">
          <a routerLink="/resetpassword" class="link link-hover text-neutral-100"> Forgot your password? </a>
        </div>
      </div>
      <div>
        <button type="submit" class="btn btn-primary w-full">
          @if (isLoading()) {
          <span class="loading loading-dots loading-lg text-primary"></span>
          } @else { SIGN IN }
        </button>
      </div>
    </div>
  </form>
  <div class="divider text-neutral-400 text-xs my-2">OR</div>
  <button
    type="button"
    class="btn btn-outline btn-neutral w-full gap-2"
    (click)="signInWithPasskey()"
    [disabled]="isLoading()"
  >
    <pc-icon name="lock-closed" [size]="4"></pc-icon>
    Sign in with a Passkey
  </button>
  <div class="py-3 text-center">
    <a routerLink="/signup" class="link link-hover text-neutral-100">SIGN UP</a>
  </div>
  } @else {
  <label class="label text-neutral-100">Enter the 6-digit verification code sent to your email</label>
  <form (submit)="verify2FA($event)" novalidate>
    <div class="space-y-3">
      <label class="input w-full validator">
        <pc-icon [size]="4" name="shield-exclamation" />
        <input
          type="text"
          placeholder="6-digit code"
          [formField]="otpForm.code"
          aria-label="Verification Code"
          autocomplete="one-time-code"
        />
      </label>

      <div>
        <button type="submit" class="btn btn-primary w-full">
          @if (isLoading()) {
          <span class="loading loading-dots loading-lg text-primary"></span>
          } @else { VERIFY }
        </button>
      </div>

      <div class="text-center pt-2">
        <button type="button" class="link link-hover text-sm text-neutral-100" (click)="cancel2FA()">
          Back to Sign In
        </button>
      </div>
    </div>
  </form>
  }
  <div class="text-neutral-200 text-center text-xs pt-4">
    <span>
      Copyright © 2024
      <a href="" rel="" target="_blank" title="CampaignRaven" class="link link-hover">CampaignRaven</a></span
    >
  </div>
</pc-auth-layout>
