@if (error() && !detail()) {
<div class="p-6 alert alert-error m-4">
  <span>{{ error() }}</span>
</div>
} @else if (!detail()) {
<div class="p-6 text-sm text-base-content/70 flex items-center gap-2">
  <span class="loading loading-spinner loading-xs"></span>
  Loading user…
</div>
} @else {
<section class="m-4 space-y-6">
  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 border-b border-base-200 pb-4 mb-6">
    <div class="flex items-center gap-3">
      <pc-icon name="user-circle" class="text-primary" [size]="7"></pc-icon>
      <div>
        <h1 class="text-2xl font-semibold">{{ displayName() }}</h1>
        <p class="text-sm text-base-content/70">{{ detail()?.email }}</p>
      </div>
    </div>

    <div class="flex items-center gap-2">
      <button
        class="btn btn-outline btn-accent btn-sm"
        type="button"
        (click)="triggerPasswordReset()"
        [disabled]="resettingPassword() || saving()"
      >
        <pc-icon name="lock-closed"></pc-icon>
        {{ resettingPassword() ? 'Sending link…' : 'Trigger Password Reset' }}
      </button>
      <pc-form-actions
        [isLoading]="saving()"
        [signalForm]="form"
        (btn1Clicked)="save($event)"
        [buttonsToShow]="'two'"
        [btn1Text]="'Save User'"
        [btn1Icon]="'save'"
        [showDelete]="true"
        [deleteText]="'Delete User'"
        (deleteClicked)="deleteUser()"
      ></pc-form-actions>
    </div>
  </div>

  @if (error()) {
  <div class="alert alert-error">
    <span>{{ error() }}</span>
  </div>
  }

  <section class="rounded border border-base-300 bg-base-100 p-6 shadow-sm">
    <h2 class="text-lg font-semibold">Profile</h2>
    <form class="mt-4 space-y-4" (submit)="save($event)" novalidate>
      <div class="grid gap-4 sm:grid-cols-2">
        <pc-input
          id="email"
          label="Email"
          type="email"
          [formField]="form.email"
          autocomplete="email"
        ></pc-input>

        <pc-select
          label="Role"
          [formField]="form.role"
        >
          @if (currentUserRole() !== 'admin') {
          <option value="owner">Owner</option>
          }
          <option value="admin">Admin</option>
          <option value="user">User</option>
          <option value="viewer">Viewer</option>
        </pc-select>

        <pc-input
          id="first_name"
          label="First name"
          [formField]="form.first_name"
          autocomplete="given-name"
        ></pc-input>

        <pc-input
          id="last_name"
          label="Last name"
          [formField]="form.last_name"
          autocomplete="family-name"
        ></pc-input>
      </div>

      <pc-toggle
        label="Verified account"
        [formField]="form.verified"
      ></pc-toggle>
    </form>
  </section>
</section>
}
