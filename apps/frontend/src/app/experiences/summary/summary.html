<!-- Sidebar -->
<p class="min-h-max w-full pt-72 text-center text-3xl">Summary module</p>

<pc-tags [tags]="['hello','you','fool']" [readonly]="readonly" [canDelete]="canDelete"></pc-tags>

<button class="btn" (click)="Info()">Info</button>
<button class="btn" (click)="Success()">Success</button>
<button class="btn" (click)="Warning()">Warning</button>
<button class="btn" (click)="Error()">Error</button>
<button class="btn" (click)="spinner()">Spinner</button>
<button class="btn" (click)="toggleRaven()">Raven</button>

@if (isLoading()) {
<div class="loading loading-bars loading-xl"></div>
} @if (ravenLoaded()) {
<div class="animate-pulse">
  <pc-icon name="loading" class="" [size]="12"></pc-icon>
</div>
}

<!-- ── Icon Gallery ───────────────────────────────────────── -->
<div class="mx-6 mt-12 mb-16">
  <h2 class="text-xl font-semibold mb-1">Icon Library</h2>
  <p class="text-sm text-base-content/60 mb-6">{{ iconList.length }} icons — hover for name</p>

  <div class="grid grid-cols-[repeat(auto-fill,minmax(80px,1fr))] gap-3">
    @for (icon of iconList; track icon.name) {
    <div
      class="group flex flex-col items-center gap-1.5 rounded-xl border border-base-300 bg-base-100 p-3 cursor-default
             hover:border-primary hover:bg-primary/10 hover:shadow transition-all duration-150 relative"
      [title]="icon.name"
    >
      <pc-icon [name]="icon.name" [size]="6" class="text-base-content group-hover:text-primary transition-colors"></pc-icon>
      <span class="text-[10px] text-base-content/50 group-hover:text-primary text-center leading-tight break-all transition-colors">
        {{ icon.name }}
      </span>
    </div>
    }
  </div>
</div>
