<div class="p-6 max-w-4xl mx-auto">
  <!-- Loading State -->
  @if (isLoading()) {
  <div class="flex flex-col items-center justify-center py-20">
    <span class="loading loading-spinner loading-lg text-primary"></span>
    <p class="text-base-content/60 mt-4">Loading company details...</p>
  </div>
  } @else {
  <div class="space-y-6">
    <pc-detail-header
      [title]="isNewMode() ? 'Add Company' : 'Company: ' + (company()?.name || '')"
      [subtitle]="isNewMode() ? 'Create a new company record' : 'View and update company information'"
      icon="briefcase"
      [iconSize]="7"
      [form]="form"
      [isLoading]="isLoading()"
      buttonsToShow="two"
      [btn1Text]="isNewMode() ? 'Create Company' : 'Save Company'"
      [showDelete]="!isNewMode()"
      deleteText="Delete Company"
      (save)="save($event)"
      (delete)="deleteCompany()"
    ></pc-detail-header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <!-- Form Section -->
      <div class="lg:col-span-2 card bg-base-100 border border-base-300 shadow-xl overflow-hidden">
        <div class="card-body p-6 space-y-4">
          <!-- Name -->
          <pc-input
            label="Company Name"
            placeholder="e.g. Acme Corp"
            [formField]="form.name"
          ></pc-input>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <!-- Website -->
            <pc-input
              label="Website"
              type="url"
              placeholder="https://example.com"
              [formField]="form.website"
            ></pc-input>

            <!-- Industry -->
            <pc-input
              label="Industry"
              placeholder="e.g. Technology"
              [formField]="form.industry"
            ></pc-input>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <!-- Email -->
            <pc-input
              label="Email"
              type="email"
              placeholder="info@example.com"
              [formField]="form.email"
            ></pc-input>

            <!-- Phone -->
            <pc-input
              label="Phone"
              type="tel"
              placeholder="+1 555-0100"
              [formField]="form.phone"
            ></pc-input>
          </div>

          <!-- Description -->
          <pc-textarea
            label="Description"
            placeholder="Company description..."
            [formField]="form.description"
            [rows]="3"
          ></pc-textarea>

          <!-- Notes -->
          <pc-textarea
            label="Internal Notes"
            placeholder="Any additional notes..."
            [formField]="form.notes"
            [rows]="4"
          ></pc-textarea>
        </div>
      </div>

      <!-- Members & Info Panel -->
      <div class="space-y-6">
        <!-- Employee List (Only when edit mode) -->
        @if (!isNewMode() && id()) {
        <div class="card bg-base-100 border border-base-300 shadow-xl">
          <div class="card-body p-6">
            <h3 class="font-bold text-lg text-base-content mb-4 flex items-center gap-2">
              <pc-icon name="user-group" class="text-primary" [size]="5"></pc-icon>
              Associated Employees
            </h3>
            @defer (on viewport) {
            <pc-people-in-company [companyId]="id()!"></pc-people-in-company>
            } @placeholder {
            <div class="skeleton w-full h-32"></div>
            }
          </div>
        </div>
        }

        <!-- Metadata Card -->
        @if (!isNewMode()) {
        <pc-entity-overview
          [createdAt]="company()?.created_at"
          [updatedAt]="company()?.updated_at"
        ></pc-entity-overview>
        }
      </div>
    </div>
  </div>
  }
</div>
