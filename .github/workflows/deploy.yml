name: Deploy

# Build → image → deploy pipeline for pplCRM (plan B: fully serverless edge).
# Platform: Azure Container Apps (backend `pplcrm-api` only) + Cloudflare (DNS/TLS; Pages for the
# marketing site + app.pplcrm.com; Workers for *.pplforms.com and go.pplcrm.com).
#
# Migrations are NOT run here: the GitHub runner can't reach the firewalled Postgres. Run them
# manually from an allow-listed machine (see deploy/PROD-CHECKLIST.md §5).
#
# Required secrets:
#   VITE_GOOGLE_MAPS_API_KEY                     (browser map key, baked at build)
#   AZURE_CREDENTIALS                            (service-principal JSON)
#   CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID  (Pages + Worker deploys)
# Required repo variables (vars.*):
#   AZURE_RESOURCE_GROUP, AZURE_API_APP, CF_PAGES_PROJECT

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '26'
  # Disable Nx Cloud in CI: nx.json carries an unclaimed nxCloudId, and Nx Cloud fails the run once
  # past its 3-day connect window. Deploys don't need distributed caching. (Claim it at cloud.nx.app
  # and drop this if you ever want Nx Cloud.)
  NX_NO_CLOUD: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      # Builds backend (esbuild bundle) + the three Angular apps. generate-context (repomix) and
      # generate-docs (tsx) codegen run as build deps — both work on a networked CI runner.
      - name: Build all deployables
        run: npx nx run-many -t build -p backend frontend companion website --configuration=production
      # The Angular (esbuild) build can't read env vars, so the browser Google Maps key is baked as a
      # placeholder token via esbuild `define` (project.json) and substituted into the built bundles
      # here. Without a valid key maps render as grey placeholders (the app still loads — the token is
      # a harmless string, never a runtime crash).
      - name: Inject Google Maps browser key
        env:
          K: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
        run: |
          if [ -n "$K" ]; then
            find dist/apps/frontend/browser dist/apps/companion/browser -name '*.js' -print0 \
              | xargs -0 perl -pi -e 's/__PPLCRM_MAPS_KEY__/$ENV{K}/g'
            echo "Injected maps key into $(grep -rl "$K" dist/apps/frontend/browser dist/apps/companion/browser | wc -l | tr -d ' ') file(s)."
          else
            echo "::warning::VITE_GOOGLE_MAPS_API_KEY secret is empty — maps will render as grey placeholders."
          fi
      - name: Upload static bundles
        uses: actions/upload-artifact@v4
        with:
          name: static-bundles
          path: |
            dist/apps/frontend
            dist/apps/companion
            dist/apps/website
          retention-days: 3

  image:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push backend image (pplcrm-api)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:latest
            ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: image
    runs-on: ubuntu-latest
    environment: production
    steps:
      # Checkout is required for the Worker deploys below: wrangler needs infra/*-edge (wrangler.toml
      # + src). The static bundles come from the build artifact, layered into dist/apps afterward.
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: static-bundles
          path: dist/apps
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      # Roll the backend to the new image — but only if the app exists. The first run (before the
      # app is hand-created in §5) just builds/pushes the image and no-ops here with a warning.
      - name: Update backend Container App (pplcrm-api)
        uses: azure/cli@v2
        with:
          inlineScript: |
            if az containerapp show -n "${{ vars.AZURE_API_APP }}" -g "${{ vars.AZURE_RESOURCE_GROUP }}" >/dev/null 2>&1; then
              az containerapp update \
                --name "${{ vars.AZURE_API_APP }}" \
                --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
                --image ghcr.io/${{ github.repository }}/backend:${{ github.sha }} \
                --set-env-vars PUBLIC_BASE_DOMAIN=pplforms.com
            else
              echo "::warning::${{ vars.AZURE_API_APP }} does not exist yet — create it manually (PROD-CHECKLIST §5), then re-run."
            fi
      # ── Cloudflare Pages: marketing site ──
      # Angular emits the static site under a `browser/` subdir; deploy THAT, not its parent.
      # --branch=main forces the *production* deployment (the custom domain serves production),
      # regardless of which git branch CI runs on.
      - name: Deploy marketing site to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/apps/website/browser --project-name=${{ vars.CF_PAGES_PROJECT }} --branch=main
      # ── Cloudflare Worker: public forms surface (*.pplforms.com) ──
      # Serves the same frontend bundle (public /f,/e,/v routes) + proxies /api and /d to the backend.
      # SPA fallback here comes from wrangler.toml `not_found_handling`, NOT a _redirects file — the
      # Workers-assets validator rejects `/* /index.html 200` as an infinite loop, so the frontend
      # bundle must NOT contain _redirects when a Worker serves it (it's injected for Pages below).
      - name: Deploy forms Worker (*.pplforms.com)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: infra/pplforms-edge
          # wrangler 4.x: the action's bundled 3.90 ignores `run_worker_first`, so /api/* wouldn't proxy.
          wranglerVersion: '4'
          command: deploy
      # ── Cloudflare Worker: volunteer companion (go.pplcrm.com) ──
      - name: Deploy companion Worker (go.pplcrm.com)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: infra/go-edge
          wranglerVersion: '4'
          command: deploy
      # ── Cloudflare Pages: CRM app (app.pplcrm.com) ──
      # LAST, because Pages needs a _redirects for SPA deep-links but the Worker steps above serve the
      # same bundle and reject that file. Inject it here (Pages accepts `/* /index.html 200`), after
      # every Worker has already consumed the clean bundle.
      - name: Inject SPA fallback for app Pages
        run: printf '/*    /index.html    200\n' > dist/apps/frontend/browser/_redirects
      - name: Deploy CRM app to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/apps/frontend/browser --project-name=${{ vars.CF_APP_PAGES_PROJECT }} --branch=main
