name: Deploy

# Build → image → migrate → deploy pipeline for pplCRM.
# Platform: Azure Container Apps (backend `pplcrm-api` + edge `pplcrm-edge`) + Cloudflare (DNS/TLS,
# Pages for the marketing site). See deployment plan §2.
#
# Required secrets:
#   VITE_GOOGLE_MAPS_API_KEY                     (browser map key, baked at build)
#   DB_HOST, DB_PORT, DB_NAME                    (target Postgres, for the migrate step)
#   DB_MIGRATION_USER, DB_MIGRATION_PASSWORD     (owner role — DDL; used only by `migrate`)
#   SHARED_SECRET                                (env schema requires it even to run migrations)
#   AZURE_CREDENTIALS                            (service-principal JSON, or switch to OIDC)
#   CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID  (Pages deploy)
# Required repo/environment variables (vars.*):
#   AZURE_RESOURCE_GROUP, AZURE_API_APP, AZURE_EDGE_APP, CF_PAGES_PROJECT
#
# NOTE: the `migrate` job needs network reachability to Postgres from the GitHub runner (public
# endpoint / firewall allowance / VPN, or a self-hosted runner in the Azure VNet).

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '26'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      # Builds backend (esbuild bundle) + the three Angular apps. generate-context (repomix) and
      # generate-docs (tsx) codegen run as build deps — both work on a networked CI runner.
      # The browser Google Maps key must be present at build time or maps render as grey placeholders.
      - name: Build all deployables
        env:
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
        run: npx nx run-many -t build -p backend frontend companion website --configuration=production
      - name: Upload static bundles
        uses: actions/upload-artifact@v4
        with:
          name: static-bundles
          path: |
            dist/apps/frontend
            dist/apps/companion
            dist/apps/website
          retention-days: 3

  image:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      # The edge image bundles the pre-built SPAs; pull them back into dist/apps for its build context.
      - uses: actions/download-artifact@v4
        with:
          name: static-bundles
          path: dist/apps
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build & push backend image (pplcrm-api)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/backend:latest
            ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build & push edge image (pplcrm-edge — Caddy + SPAs)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Caddy.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/edge:latest
            ghcr.io/${{ github.repository }}/edge:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  migrate:
    needs: image
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      # Runs as the OWNER role over the .ts migration source (plain Node can't import .ts, hence tsx).
      # The runner must be able to reach the DB (public endpoint / VPN / self-hosted in-network runner).
      # DB_USER/DB_PASSWORD are set to the owner creds so the env schema validates; the migrator uses
      # env.migrationDb (DB_MIGRATION_*). Kysely records applied migrations in kysely_migration.
      - name: Run DB migrations
        env:
          NODE_ENV: production
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_SSL: 'true'
          DB_MIGRATION_USER: ${{ secrets.DB_MIGRATION_USER }}
          DB_MIGRATION_PASSWORD: ${{ secrets.DB_MIGRATION_PASSWORD }}
          DB_USER: ${{ secrets.DB_MIGRATION_USER }}
          DB_PASSWORD: ${{ secrets.DB_MIGRATION_PASSWORD }}
          SHARED_SECRET: ${{ secrets.SHARED_SECRET }}
        run: npx tsx apps/backend/src/app/kyselyinit.ts

  deploy:
    needs: migrate
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: static-bundles
          path: dist/apps
      # ── Azure: roll both Container Apps to the new image tags ──
      # AZURE_CREDENTIALS = a service-principal JSON (or configure OIDC). RESOURCE_GROUP/app names via vars.
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Update backend Container App (pplcrm-api)
        uses: azure/cli@v2
        with:
          inlineScript: |
            az containerapp update \
              --name ${{ vars.AZURE_API_APP }} \
              --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
              --image ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
      - name: Update edge Container App (pplcrm-edge)
        uses: azure/cli@v2
        with:
          inlineScript: |
            az containerapp update \
              --name ${{ vars.AZURE_EDGE_APP }} \
              --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
              --image ghcr.io/${{ github.repository }}/edge:${{ github.sha }}
      # ── Cloudflare Pages: publish the marketing site ──
      - name: Deploy website to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/apps/website --project-name=${{ vars.CF_PAGES_PROJECT }}
