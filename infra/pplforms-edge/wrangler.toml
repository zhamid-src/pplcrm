# pplforms-edge — reverse proxy for *.pplforms.com (see src/index.ts and README.md).
#
# Deploy flow:
#   1. npx nx build frontend --configuration=production   # produces ../../dist/apps/frontend/browser
#   2. npx wrangler deploy                                 # from this directory
name = "pplforms-edge"
main = "src/index.ts"
compatibility_date = "2025-06-01"

# Static SPA bundle. `run_worker_first` is REQUIRED: without it, Cloudflare serves assets before the
# Worker runs, and SPA `not_found_handling` would return index.html for /api/* and /d/* instead of
# proxying them. Listing those prefixes forces the Worker to handle them first; every other path
# falls through to the static bundle, with unmatched client routes served index.html.
[assets]
directory = "../../dist/apps/frontend/browser"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/d/*"]

[vars]
# Backend origin bound on the Container App. Cloudflare-proxied, so Full (strict) is satisfied by
# the Container App's managed cert for api.pplcrm.com.
BACKEND_ORIGIN = "https://api.pplcrm.com"

# Route the wildcard public domain through this Worker. Requires a PROXIED wildcard DNS record for
# *.pplforms.com in the pplforms.com zone (see README.md) so Cloudflare answers for the hostnames.
routes = [
  { pattern = "*.pplforms.com/*", zone_name = "pplforms.com" },
]
